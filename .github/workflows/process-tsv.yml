name: Process TSV and Deploy Pages

# Trigger the workflow when files in the tsv/ directory are modified.
on:
  push:
    paths:
      - 'tsv/**/*.tsv'
  workflow_dispatch: 

# These permissions allow the bot to commit files AND deploy the website
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ==========================================
  # JOB 1: Run Python Script & Commit Files
  # ==========================================
  convert-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Notice we removed the PAT token here! It will use the default GITHUB_TOKEN.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Make the converter script executable
        run: chmod +x tools/converter.py

      - name: Process all TSV files
        run: |
          mkdir -p json bibtex

          for tsv_file in tsv/*.tsv; do
            [ -e "$tsv_file" ] || continue
            
            YEAR=$(echo "$tsv_file" | grep -o -E '[0-9]{4}')
            if [ -z "$YEAR" ]; then continue; fi
            
            echo "Processing file for year: $YEAR ($tsv_file)"
            
            # Calculate 5-year parent directory bounds
            REMAINDER=$((YEAR % 5))
            if [ $REMAINDER -eq 0 ]; then
              UPPER_BOUND=$YEAR
            else
              UPPER_BOUND=$((YEAR + 5 - REMAINDER))
            fi
            
            LOWER_BOUND=$((UPPER_BOUND - 4))
            if [ $LOWER_BOUND -lt 1997 ]; then LOWER_BOUND=1997; fi
            
            PARENT_DIR="${UPPER_BOUND}-${LOWER_BOUND}"
            
            mkdir -p "proceedings/${PARENT_DIR}"
            
            MD_OUTPUT="proceedings/${PARENT_DIR}/${YEAR}.md"
            JSON_OUTPUT="json/recomb${YEAR}.json"
            BIB_OUTPUT="bibtex/recomb${YEAR}.bib"
            
            python tools/converter.py -i "$tsv_file" -md "$MD_OUTPUT" -json "$JSON_OUTPUT" -bib "$BIB_OUTPUT"
          done

      - name: Commit and push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add proceedings/ json/ bibtex/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated conversion: TSV to MD, JSON, and BibTeX"
            git push
          fi

  # ==========================================
  # JOB 2: Build and Deploy the Website
  # ==========================================
  build-and-deploy:
    # This tells Job 2 to wait until Job 1 finishes successfully
    needs: convert-and-commit 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # Pull the absolute latest code, including the bot's new commit

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
